set -g default-terminal "screen-256color"
set -g focus-events on
set -sg escape-time 10

set -g history-limit 50000

set -g allow-passthrough on
set -g set-clipboard on

set -g mouse on
setw -g mode-keys vi

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Theme stuff
set -g status-interval 1
run-shell '~/.local/bin/tmux-apply-theme'
set-hook -g client-attached 'run-shell ~/.local/bin/tmux-apply-theme'
set-hook -g session-created 'run-shell ~/.local/bin/tmux-apply-theme'

set -g status-left '#{?client_prefix,✨,  }'
set -ga status-left '#{?window_zoomed_flag, 🔍 ,    }'
set -g status-right '#(todo) #(date "+%H:%M") '

set -g status-position top

setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '



set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'trevarj/tmux-open-nvim'
set -g @plugin 'tmux-plugins/tmux-open'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -g @catppuccin_status_modules_right "session date_time"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""

run '~/.tmux/plugins/tpm/tpm'

bind r source-file ~/.tmux.conf \; display ​"Reloaded 🎉"

bind - split-window -v
bind y copy-mode

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

bind g attach -t gh

bind + switch-client -l
bind = switch-client -l
# session jumper https://waylonwalker.com/tmux-fzf-session-jump/
bind w display-popup -E "\
    tmux list-sessions -F '#{?#{==:#{session_name},#{client_session}},,#{session_name}}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-session --preview 'tmux capture-pane -pt {}'  |\
    xargs tmux switch-client -t"

set -g status-left '#{?client_prefix,✨,  }'
 
bind b display-popup -E "glow ~/syncthing/Notes/tech/tmux.md && sleep 10"


set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
set-environment -g TMUX_COMMAND tmux
